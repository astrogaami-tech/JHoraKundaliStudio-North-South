<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrogaami — Dual Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F2F0EC;--white:#fff;--border:#D5D0C8;--text:#1E1C18;--muted:#9CA3AF;--subtle:#B0A898;--ink:#16152A;--font:'Noto Sans',Arial,sans-serif;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:12px;}
#app{display:flex;flex-direction:column;height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;flex-shrink:0;background:linear-gradient(135deg,#16152A,#2A275E);color:#fff;box-shadow:0 2px 8px rgba(22,21,42,.35);}
.hb{display:flex;align-items:center;gap:8px;}
.hb .logo{font-size:15px;font-weight:800;letter-spacing:.02em;}
.hb .sub{font-size:9px;font-weight:600;opacity:.38;letter-spacing:.16em;text-transform:uppercase;}
.ha{display:flex;gap:5px;align-items:center;}
.btn{border:none;border-radius:6px;cursor:pointer;font-family:var(--font);font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:10px;padding:5px 11px;transition:opacity .14s,transform .1s;}
.btn:hover{opacity:.86;}.btn:active{transform:scale(.97);}
.btn-ghost{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;}
.btn-amber{background:#F59E0B;color:#1C1917;}.btn-green{background:#15803D;color:#fff;}.btn-dark{background:#16152A;color:#fff;}
.metabar{display:flex;align-items:center;gap:8px;padding:5px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.mf{display:flex;align-items:center;gap:4px;}
.mf label{font-size:8px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#9CA3AF;white-space:nowrap;}
.mi{border:1px solid #E5E7EB;border-radius:4px;padding:3px 7px;font-size:11px;font-family:var(--font);color:var(--text);background:#FAFAFA;outline:none;transition:border-color .14s;}
.mi:focus{border-color:#5046E4;background:#fff;}
.mi-name{width:120px;font-weight:700;}.mi-date{width:90px;}.mi-time{width:82px;}.mi-loc{width:120px;}
.mi-div{width:38px;font-weight:800;text-align:center;color:#16152A;font-size:12px;}
.msep{color:#D1D5DB;user-select:none;padding:0 1px;}
.divbadge{display:flex;align-items:center;gap:4px;background:#F0F0F0;border:1px solid #D0CCC6;border-radius:5px;padding:2px 8px;}
.divbadge span{font-size:8px;font-weight:800;color:#666;letter-spacing:.1em;text-transform:uppercase;}
.divbadge .mi{background:transparent;border:none;padding:0 2px;width:36px;color:#18182A;}
.opts{display:flex;align-items:center;gap:6px;margin-left:auto;}
.opt-toggle{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px;font-weight:700;color:#555;padding:3px 8px;border:1px solid #E5E7EB;border-radius:5px;background:#FAFAFA;}
.opt-toggle.on{background:#16152A;color:#fff;border-color:#16152A;}
/* Color palette swatches */
.palette{display:flex;align-items:center;gap:3px;}
.swatch{width:18px;height:18px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.swatch:hover{transform:scale(1.15);}
.swatch.active{border-color:#16152A;box-shadow:0 0 0 2px rgba(22,21,42,.15);}
.body-row{display:flex;flex:1;overflow:hidden;}
aside{width:184px;flex-shrink:0;background:#fff;border-right:1px solid #EEEBE5;display:flex;flex-direction:column;overflow:hidden;}
.aside-inner{flex:1;overflow-y:auto;padding:10px 9px;}
.stitle{font-size:8px;font-weight:800;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid #F0EDE8;}
.pps{margin-bottom:8px;}.ppl{font-size:8px;font-weight:800;color:var(--subtle);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.ppills{display:flex;flex-wrap:wrap;gap:3px;}
.pp{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid transparent;user-select:none;line-height:1.5;}
.pp:hover{filter:brightness(.91);}.pp.sel{border-color:#5046E4;box-shadow:0 0 0 2px rgba(80,70,228,.18);}
.sp{display:inline-block;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;background:#F3F4F6;color:#374151;border:1.5px solid transparent;user-select:none;line-height:1.5;}
.sp:hover{background:#E5E7EB;}.sp.act{background:#16152A;color:#fff;}
.alist{margin-top:7px;padding-top:6px;border-top:1px solid #F0EDE8;}
.arow{display:flex;align-items:center;margin-bottom:3px;font-size:10px;gap:4px;}
.arow .ap{font-weight:700;min-width:22px;}.arow .as{color:#6B7280;flex:1;}
.arow .degedit{width:54px;border:1px solid #E5E7EB;border-radius:4px;padding:1px 4px;font-size:10px;font-family:monospace;color:#444;background:#FAFAFA;outline:none;}
.arow .degedit:focus{border-color:#5046E4;background:#fff;}
.arow .ax{cursor:pointer;color:#D1D5DB;font-size:11px;padding:1px 3px;border-radius:3px;}
.arow .ax:hover{color:#EF4444;background:#FEE2E2;}
.empty-hint{font-size:9px;color:var(--subtle);font-style:italic;text-align:center;padding:6px 0;}
.instr{font-size:8px;color:#9CA3AF;padding:6px 9px;border-top:1px solid #F0EDE8;text-align:center;flex-shrink:0;line-height:1.6;}
main{flex:1;overflow:auto;padding:10px 14px;display:flex;flex-direction:column;align-items:center;}
.crow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.cpanel{display:flex;flex-direction:column;gap:5px;}
.ccard{background:#fff;border-radius:7px;padding:6px;box-shadow:0 2px 12px rgba(22,21,42,.07);}
.degbar{margin-top:12px;background:#fff;border-radius:7px;padding:11px 16px;box-shadow:0 2px 12px rgba(22,21,42,.07);max-width:860px;width:100%;}
.degbar-title{font-size:8px;font-weight:800;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.degflow{font-size:16px;line-height:2.0;color:#333;}
.entry{white-space:nowrap;}
.e-name{font-weight:700;color:inherit;}
.e-kar{font-weight:400;color:inherit;opacity:.85;}
.e-flag{font-weight:400;color:inherit;opacity:.85;text-decoration:underline;text-underline-offset:2px;}
.e-sep{display:inline-block;width:10px;}
.e-nak{font-style:italic;}
.degbar-empty{font-size:10px;color:var(--subtle);font-style:italic;text-align:center;padding:4px 0;}
.moverlay{position:fixed;inset:0;z-index:50;background:rgba(22,21,42,.55);display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.mbox{background:#fff;border-radius:11px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 20px 55px rgba(22,21,42,.28);}
.mhead{background:linear-gradient(135deg,#16152A,#2A275E);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.mt{color:#fff;font-size:13px;font-weight:700;}.ms{color:rgba(255,255,255,.45);font-size:10px;margin-top:1px;}
.mcls{background:rgba(255,255,255,.15);border:none;color:#fff;width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.mbody{padding:12px 16px;}
.mta{width:100%;height:170px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;font-size:11px;font-family:monospace;color:var(--text);outline:none;resize:none;line-height:1.75;}
.mta.err{border-color:#EF4444;}.merr{color:#EF4444;font-size:10px;margin-top:4px;display:none;}
.mfoot{padding:9px 16px 15px;display:flex;justify-content:flex-end;gap:6px;}
.mcancel{background:var(--bg);border:1.5px solid var(--border);color:#6B7280;font-size:11px;font-weight:600;padding:5px 13px;border-radius:6px;cursor:pointer;font-family:var(--font);}
.toast{position:fixed;bottom:16px;right:16px;background:#16152A;color:#fff;padding:7px 13px;border-radius:7px;font-size:11px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.a1{animation:up .26s ease both;}.a2{animation:up .26s .06s ease both;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hb"><span class="logo">✦ Astrogaami</span><span class="sub">Dual Chart</span></div>
    <div class="ha">
      <button class="btn btn-ghost" id="btn-clear">Clear</button>
      <button class="btn btn-amber" id="btn-jhora">⚡ JHora</button>
      <button class="btn btn-green" id="btn-dual-png">↓ Dual PNG</button>
      <button class="btn btn-dark" id="btn-es-png">S·PNG</button>
      <button class="btn btn-dark" id="btn-en-png">N·PNG</button>
    </div>
  </header>
  <div class="metabar">
    <div class="mf"><label>Name</label><input class="mi mi-name" id="m-name" type="text" placeholder="Native name"></div>
    <span class="msep">·</span>
    <div class="mf"><label>Date</label><input class="mi mi-date" id="m-date" type="text" placeholder="19 Nov 1917"></div>
    <div class="mf"><label>Time</label><input class="mi mi-time" id="m-time" type="text" placeholder="23:11"></div>
    <span class="msep">·</span>
    <div class="mf"><label>Place</label><input class="mi mi-loc" id="m-loc" type="text" placeholder="City, Country"></div>
    <span class="msep">·</span>
    <div class="divbadge"><span>Div</span><input class="mi mi-div" id="m-div" type="text" value="D1" maxlength="6"></div>
    <div class="opts">
      <div class="palette" id="palette" title="Chart color theme"></div>
      <div class="opt-toggle" id="tog-swap" title="Swap chart positions (South ⇄ North)">⇄ Swap</div>
      <div class="opt-toggle" id="tog-deg" title="Show degrees inside chart cells">°Deg</div>
      <div class="opt-toggle" id="tog-foot" title="Show astrogaami.com footer">Footer</div>
    </div>
  </div>
  <div class="body-row">
    <aside>
      <div class="aside-inner">
        <div class="stitle">Assign Positions</div>
        <div class="pps"><div class="ppl">① Planet</div><div class="ppills" id="planet-pills"></div></div>
        <div class="pps"><div class="ppl">② Sign</div><div class="ppills" id="sign-pills"></div></div>
        <div class="alist"><div class="ppl">Assigned · edit degree</div><div id="alist-body"><div class="empty-hint">None yet</div></div></div>
      </div>
      <div class="instr">Click planet → sign<br>Type degree to fine-tune · <strong>✕</strong> removes</div>
    </aside>
    <main>
      <div class="crow">
        <div class="cpanel a1" id="panel-south"><div class="ccard"><svg id="ssvg"></svg></div></div>
        <div class="cpanel a2" id="panel-north"><div class="ccard"><svg id="nsvg"></svg></div></div>
      </div>
      <div class="degbar">
        <div class="degbar-title">Planetary Positions</div>
        <div id="degbar-body"><div class="degbar-empty">No data yet — assign planets or import from JHora</div></div>
      </div>
    </main>
  </div>
  <div class="moverlay" id="modal" style="display:none">
    <div class="mbox">
      <div class="mhead">
        <div><div class="mt">Import from Jagannatha Hora</div><div class="ms">Paste Basic Data section</div></div>
        <button class="mcls" id="mcls">✕</button>
      </div>
      <div class="mbody">
        <textarea class="mta" id="jtin" placeholder="Lagna   1 Cn 27' 26&quot;&#10;Sun     4 Sc  8' 19&quot;&#10;Moon    4 Cp 42' 16&quot;&#10;Mars    3 Le 23'&#10;..."></textarea>
        <div class="merr" id="jerr"></div>
      </div>
      <div class="mfoot">
        <button class="mcancel" id="mcan">Cancel</button>
        <button class="btn btn-dark" id="bparse">Populate →</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/* ══ FONT PRELOAD ══════════════════════════════════════════════════════════ */
let FONT_B64=null;
(async()=>{
  try{
    const css=await(await fetch('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&display=swap')).text();
    const m=css.match(/url\((https:\/\/fonts\.gstatic\.com\/[^)]+\.woff2)\)/);
    if(!m)return;
    const buf=await(await fetch(m[1])).arrayBuffer();
    FONT_B64='data:font/woff2;base64,'+btoa(String.fromCharCode(...new Uint8Array(buf)));
  }catch(e){}
})();

/* ══ COLOR PALETTES — professional, slight peppy tint, single-hue ══════════ */
const PALETTES=[
  {name:'Classic',line:'#1A1A1A',text:'#000000',num:'#9A9A9A',tint:'#F2F2F2',sw:'#1A1A1A'},
  {name:'Indigo', line:'#2A2A6B',text:'#1E1B4B',num:'#9794C4',tint:'#EEF0FB',sw:'#2A2A6B'},
  {name:'Maroon', line:'#6B1F2A',text:'#4A1119',num:'#BD9298',tint:'#FBEFF1',sw:'#6B1F2A'},
  {name:'Forest', line:'#1B4D3E',text:'#0F3A2C',num:'#8FB6A8',tint:'#EAF4F0',sw:'#1B4D3E'},
  {name:'Slate',  line:'#2C3E6B',text:'#1A2847',num:'#929DBE',tint:'#EEF1F8',sw:'#2C3E6B'},
  {name:'Saffron',line:'#7A3B0E',text:'#5A2A08',num:'#C7A485',tint:'#FBF3EA',sw:'#7A3B0E'},
  {name:'Purple', line:'#4A2168',text:'#33134A',num:'#B098C7',tint:'#F3EEF9',sw:'#4A2168'},
  {name:'Teal',   line:'#0D4A52',text:'#06343A',num:'#88B4B9',tint:'#E8F3F4',sw:'#0D4A52'},
];
// Default — change index here to set a different always-on default
let paletteIdx=1; // Indigo by default (professional + peppy)
const PAL=()=>PALETTES[paletteIdx];

/* ══ CONSTANTS — ONLY Asc + 9 planets ══════════════════════════════════════ */
const SIGNS=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
const SIGN_S=['Ar','Ta','Ge','Cn','Le','Vi','Li','Sc','Sg','Cp','Aq','Pi'];
const NAKSHATRAS=['Ashwini','Bharani','Krittika','Rohini','Mrigashira','Ardra','Punarvasu','Pushya','Ashlesha','Magha','P.Phalguni','U.Phalguni','Hasta','Chitra','Swati','Vishakha','Anuradha','Jyeshtha','Mula','P.Ashadha','U.Ashadha','Shravana','Dhanishta','Shatabhisha','P.Bhadra','U.Bhadra','Revati'];
const NAK_ABBR=['Aswi','Bhar','Krit','Rohi','Mrig','Ardr','Puna','Push','Asre','Magh','PPha','UPha','Hast','Chit','Swat','Visa','Anu','Jye','Mula','PSha','USha','Srav','Dhan','Sata','PBha','UBha','Reva'];
function nakPada(signIdx,deg){const al=signIdx*30+deg;const ns=360/27;const ni=Math.floor(al/ns)%27;const pd=Math.floor((al%ns)/(ns/4))+1;return{nak:NAKSHATRAS[ni],abbr:NAK_ABBR[ni],pada:pd};}

/* ══ CLASSICAL ANNOTATION ENGINE ════════════════════════════════════════════
   Computes practitioner flags from sign + degree. All scripturally standard.
   • C   = Combust (Astangata) — within classical orb of the Sun
   • GY  = Graha Yuddha (planetary war) — any two non-node planets within 1°
           (JHora-style: includes the Sun and Moon, excludes Rahu/Ketu)
   • MB  = Mrityu Bhaga — planet at its fatal degree (within 1°) for its sign
   Karakas (Jaimini Chara, 7-scheme): AK AmK BK MK PK GK DK by degree desc.
   Note: combustion orbs use standard (non-retrograde) values; retro status
   isn't carried in the data, so Mercury/Venus retro-narrowed orbs aren't applied.
──────────────────────────────────────────────────────────────────────────── */
const MRITYU={
  lagna:[1,9,22,22,25,2,4,23,18,20,21,10],
  sun:[20,9,12,6,8,24,16,17,22,2,3,23],
  moon:[26,12,13,25,24,11,26,14,13,25,5,12],
  mars:[19,28,25,23,29,28,14,21,2,15,11,6],
  mercury:[15,14,13,12,8,18,20,10,21,22,7,5],
  jupiter:[19,29,12,27,6,4,13,10,17,11,15,28],
  venus:[28,15,11,17,10,13,4,6,27,12,29,19],
  saturn:[10,4,7,9,12,16,3,18,28,14,13,15],
  rahu:[14,13,12,11,24,23,22,21,10,20,18,8],
  ketu:[8,18,20,10,21,22,23,24,11,12,13,14],
};
const COMBUST_ORB={mars:17,mercury:14,jupiter:11,venus:10,saturn:15}; /* Moon excluded — its Sun-proximity is kshina Chandra, not astangata */
const YUDDHA_GRAHAS=['sun','moon','mars','mercury','jupiter','venus','saturn'];
function absLongOf(key){const d=state.data[key];if(!d)return null;return SIGNS.indexOf(d.sign)*30+(d.deg||0);}
function angSep(a,b){let x=Math.abs(a-b);if(x>180)x=360-x;return x;}

function computeAnnotations(){
  const ann={}; // key -> Set of tags
  const add=(k,t)=>{(ann[k]=ann[k]||new Set()).add(t);};
  // Combustion
  const sunL=absLongOf('sun');
  if(sunL!=null){
    Object.entries(COMBUST_ORB).forEach(([k,orb])=>{
      const l=absLongOf(k);if(l==null)return;
      if(angSep(l,sunL)<=orb)add(k,'C');
    });
  }
  // Graha Yuddha
  for(let i=0;i<YUDDHA_GRAHAS.length;i++)for(let j=i+1;j<YUDDHA_GRAHAS.length;j++){
    const a=YUDDHA_GRAHAS[i],b=YUDDHA_GRAHAS[j];
    const la=absLongOf(a),lb=absLongOf(b);
    if(la==null||lb==null)continue;
    if(angSep(la,lb)<=1){add(a,'GY');add(b,'GY');}
  }
  // Mrityu Bhaga
  Object.entries(MRITYU).forEach(([k,degs])=>{
    const d=state.data[k];if(!d)return;
    const si=SIGNS.indexOf(d.sign);
    if(Math.abs((d.deg||0)-degs[si])<=1)add(k,'MB');
  });
  return ann;
}
function computeKarakas(){
  const KN=['AK','AmK','BK','MK','PK','GK','DK'];
  const list=['sun','moon','mars','mercury','jupiter','venus','saturn']
    .filter(k=>state.data[k]).map(k=>({k,deg:state.data[k].deg||0}))
    .sort((a,b)=>b.deg-a.deg);
  const res={};list.forEach((o,i)=>{if(i<KN.length)res[o.k]=KN[i];});
  return res;
}
const PDEFS=[
  {key:'lagna',   s:'As', label:'Ascendant', ppbg:'#FEE2E2',ppfg:'#991B1B'},
  {key:'sun',     s:'Su', label:'Sun',        ppbg:'#FEF3C7',ppfg:'#92400E'},
  {key:'moon',    s:'Mo', label:'Moon',       ppbg:'#E0F2FE',ppfg:'#0C4A6E'},
  {key:'mars',    s:'Ma', label:'Mars',       ppbg:'#FFE4E6',ppfg:'#9F1239'},
  {key:'mercury', s:'Me', label:'Mercury',    ppbg:'#D1FAE5',ppfg:'#065F46'},
  {key:'jupiter', s:'Ju', label:'Jupiter',    ppbg:'#FEF9C3',ppfg:'#713F12'},
  {key:'venus',   s:'Ve', label:'Venus',      ppbg:'#FCE7F3',ppfg:'#831843'},
  {key:'saturn',  s:'Sa', label:'Saturn',     ppbg:'#F3E8FF',ppfg:'#4C1D95'},
  {key:'rahu',    s:'Ra', label:'Rahu',       ppbg:'#F1F5F9',ppfg:'#334155'},
  {key:'ketu',    s:'Ke', label:'Ketu',       ppbg:'#E2E8F0',ppfg:'#1E293B'},
];

let state={data:{},selectedPlanet:null,degInChart:false,footer:false,swap:false};
PDEFS.forEach(p=>state.data[p.key]=null);

const el=id=>document.getElementById(id);
const v=id=>el(id).value.trim();
const lagnaIdx=()=>{const d=state.data.lagna;return d?SIGNS.indexOf(d.sign):-1;};

/* ══ JHORA PARSER — only core bodies ═══════════════════════════════════════ */
function parseJhora(text){
  const res={};
  const keyMap={'ascendant':'lagna','lagna':'lagna','sun':'sun','moon':'moon','mars':'mars','mercury':'mercury','jupiter':'jupiter','venus':'venus','saturn':'saturn','rahu':'rahu','ketu':'ketu'};
  for(let raw of text.split('\n')){
    const line=raw.trim();if(!line)continue;
    const toks=line.split(/\s+/);if(toks.length<3)continue;
    const first=toks[0].toLowerCase();
    const key=keyMap[first];if(!key)continue;
    let si=-1,sti=-1;
    toks.forEach((t,i)=>{if(i<1)return;const s=SIGN_S.indexOf(t);if(s!==-1&&si===-1){si=s;sti=i;}});
    if(si===-1)continue;
    let deg=0,min=0,sec=0;
    for(let j=sti-1;j>=0;j--){const n=parseFloat(toks[j]);if(!isNaN(n)){deg=n;break;}}
    if(sti+1<toks.length){const m=parseFloat(toks[sti+1].replace(/['"°]/g,''));if(!isNaN(m))min=m;}
    if(sti+2<toks.length){const s2=parseFloat(toks[sti+2].replace(/['"°]/g,''));if(!isNaN(s2))sec=s2;}
    const td=deg+min/60+sec/3600;
    res[key]={sign:SIGNS[si],deg:td};
    if(key==='rahu'&&!res.ketu)res.ketu={sign:SIGNS[(si+6)%12],deg:td};
    if(key==='ketu'&&!res.rahu)res.rahu={sign:SIGNS[(si+6)%12],deg:td};
  }
  return res;
}

/* Parse the JHora header block for Date / Time / Place — so the practitioner
   pastes once and the metabar auto-fills. Name defaults to Case-dd-mm-yyyy. */
const _MONTHS={january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
const _MON_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function parseJhoraMeta(text){
  const meta={};
  // Date: "June 14, 1946"
  const md=text.match(/Date:\s*([A-Za-z]+)\s+(\d+),\s*(\d{4})/);
  if(md){
    const mon=_MONTHS[md[1].toLowerCase()];const day=+md[2],yr=+md[3];
    if(mon){
      meta.date=`${day} ${_MON_ABBR[mon-1]} ${yr}`;
      meta.name=`Case-${String(day).padStart(2,'0')}-${_MON_ABBR[mon-1]}-${yr}`;
    }
  }
  // Time: "10:54:00" -> "10:54"
  const mt=text.match(/Time:\s*(\d{1,2}):(\d{2})/);
  if(mt)meta.time=`${mt[1]}:${mt[2]}`;
  // Place: the city line usually follows the coordinate line
  const mp=text.match(/Place:[^\n]*\n\s*([^\n]+)/);
  if(mp)meta.place=mp[1].trim();
  return meta;
}
function fmtDeg(deg){if(deg==null)return'—';const d=Math.floor(deg),m=Math.floor((deg-d)*60);return`${d}°${String(m).padStart(2,'0')}′`;}
/* Format a birth time to explicit 12-hour AM/PM, so there's no ambiguity.
   Accepts "15:13", "15:13:00", "3:13 pm", "9:05" etc. If it can't parse a
   sensible 24h/12h time, it returns the original string untouched. */
function fmt12h(t){
  if(!t)return t;
  const s=String(t).trim();
  const m=s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*(am|pm|AM|PM)?/);
  if(!m)return t;
  let h=+m[1];const min=m[2];const ap=m[3]?m[3].toLowerCase():null;
  if(ap){ // already 12h with a marker — just normalize
    return `${h}:${min} ${ap.toUpperCase()}`;
  }
  if(h<0||h>23)return t;
  const suffix=h<12?'AM':'PM';
  let h12=h%12; if(h12===0)h12=12;
  return `${h12}:${min} ${suffix}`;
}
/* Chart cells: sort ASCENDING by degree so the smallest degree sits at the top
   and the largest at the bottom — reading a cell top-to-bottom then follows the
   0deg->30deg flow within the sign, as expected. */
function planetsInSign(signIdx){return PDEFS.filter(p=>state.data[p.key]&&SIGNS.indexOf(state.data[p.key].sign)===signIdx).sort((a,b)=>(state.data[a.key].deg||0)-(state.data[b.key].deg||0));}

/* House number of a planet (1-12 from Lagna) — used for the H-label only */
function houseOf(p){
  const li=lagnaIdx();const d=state.data[p.key];
  if(!d||li===-1)return 99;
  return(SIGNS.indexOf(d.sign)-li+12)%12+1;
}
/* Degree summary follows the FIXED classical graha sequence, like JHora —
   As, Su, Mo, Ma, Me, Ju, Ve, Sa, Ra, Ke — so a planet always sits in the
   same position and the eye finds it predictably. PDEFS is already in order. */
function planetsFixedOrder(){
  return PDEFS.filter(p=>state.data[p.key]);
}

/* ══ INLINE FLOWING SUMMARY — compact book style ════════════════════════════
   Per planet, one flowing entry that wraps naturally:
     <b>Name</b> – [KARAKA]-[FLAGS] DD Sgn MM – Nak(pada)
   Flags (C/MB/GY) shown in red. Karaka & flag segment only when present.
   This mirrors how a published book prints positions seamlessly inline.
──────────────────────────────────────────────────────────────────────────── */
function planetEntryHTML(p){
  const d=state.data[p.key];const si=SIGNS.indexOf(d.sign);
  const ann=computeAnnotations();const kar=computeKarakas();
  const dd=Math.floor(d.deg||0),mm=String(Math.floor(((d.deg||0)-dd)*60)).padStart(2,'0');
  const np=nakPada(si,d.deg||0);
  const tags=ann[p.key]?[...ann[p.key]]:[];
  const k=kar[p.key]||'';
  // Build the karaka-flags segment
  const kfBits=[];
  if(k)kfBits.push(`<span class="e-kar">${k}</span>`);
  tags.forEach(t=>kfBits.push(`<span class="e-flag">${t}</span>`));
  const kf=kfBits.length?` – ${kfBits.join('-')}`:'';
  const deg=`${dd}° ${mm}′ - ${SIGN_S[si]}`;
  const nak=`<span class="e-nak">${np.abbr}</span>(${np.pada})`;
  return `<span class="entry"><b class="e-name">${p.s}</b>${kf} ${deg} – ${nak}</span>`;
}
function buildDegBar(){
  const body=el('degbar-body');body.innerHTML='';
  const ordered=planetsFixedOrder();
  if(!ordered.length){body.innerHTML='<div class="degbar-empty">No data yet — assign planets or import from JHora</div>';return;}
  const flow=document.createElement('div');flow.className='degflow';
  flow.style.color=PAL().text;
  flow.innerHTML=ordered.map(planetEntryHTML).join('<span class="e-sep"></span>');
  body.appendChild(flow);
}

/* ══════════════════════════════════════════════════════════════════════════
   CHART RENDERING — palette-driven, print/Word optimized

const V=1000;
const NS='http://www.w3.org/2000/svg';
const F="'Noto Sans',Arial,sans-serif";

function mk(tag,attrs,txt){
  const e=document.createElementNS(NS,tag);

}
function screenSz(){
  const H=window.innerHeight-44-36-20-92-14;

}
function pLabel(p){
  // Ascendant shown as -As- so it's visually distinct from the grahas in a cell
  const nm=p.key==='lagna'?`-${p.s}-`:p.s;
  if(!state.degInChart)return nm;

  if(deg==null)return nm;

}

/* ── SOUTH INDIAN ──────────────────────────────────────────────────────── */
const SOUTH_GRID=[11,0,1,2, 10,-1,-1,3, 9,-1,-1,4, 8,7,6,5];

function buildSouthSVG(){
  const li=lagnaIdx();const CS=V/4;const dv=v('m-div')||'D1';
  const P=PAL();

  svg.setAttribute('xmlns',NS);svg.setAttribute('width',V);svg.setAttribute('height',V);
  svg.setAttribute('viewBox',`0 0 ${V} ${V}`);
  svg.appendChild(mk('rect',{width:V,height:V,fill:'#fff'}));
  svg.appendChild(mk('rect',{x:0,y:0,width:V,height:V,fill:'none',stroke:P.line,'stroke-width':'5'}));
  SOUTH_GRID.forEach((si,idx)=>{
    const col=idx%4,row=Math.floor(idx/4);const cx=col*CS,cy=row*CS;
    if(si===-1){

        svg.appendChild(mk('rect',{x:CS,y:CS,width:CS*2,height:CS*2,fill:'#fff',stroke:P.line,'stroke-width':'3'}));

    for(;fs>=14;fs--){const stackH=cnt*fs*1.18;const maxChars=Math.max(...planets.map(p=>pLabel(p).length));const estW=maxChars*fs*0.58;if(stackH<=usableH&&estW<=usableW)break;}
    const lineH=fs*1.18,totalH=cnt*lineH;const startY=cy+PAD+fs*0.55+(usableH-totalH)/2;
    planets.forEach((p,pi)=>{svg.appendChild(mk('text',{x:cx+PAD,y:startY+pi*lineH,'text-anchor':'start','dominant-baseline':'middle','font-family':F,'font-size':fs,'font-weight':'700',fill:P.text},pLabel(p)));});

/* ── NORTH INDIAN — verified geometry, one number per house ───────────────── */
const N_POLY=[
  [[.5,0],[.75,.25],[.5,.5],[.25,.25]],[[0,0],[.5,0],[.25,.25]],[[0,0],[.25,.25],[0,.5]],
  [[0,.5],[.25,.25],[.5,.5],[.25,.75]],[[0,.5],[.25,.75],[0,1]],[[0,1],[.25,.75],[.5,1]],
  [[.5,1],[.25,.75],[.5,.5],[.75,.75]],[[.5,1],[.75,.75],[1,1]],[[1,1],[.75,.75],[1,.5]],
  [[1,.5],[.75,.75],[.5,.5],[.75,.25]],[[1,.5],[.75,.25],[1,0]],[[1,0],[.75,.25],[.5,0]],
];
const N_CEN=N_POLY.map(poly=>{const n=poly.length;return[poly.reduce((s,p)=>s+p[0],0)/n,poly.reduce((s,p)=>s+p[1],0)/n];});
const N_NUM=N_POLY.map((poly,i)=>{const c=N_CEN[i];let best=poly[0],bd=Infinity;poly.forEach(p=>{const d=(p[0]-0.5)**2+(p[1]-0.5)**2;if(d<bd){bd=d;best=p;}});return[c[0]+(best[0]-c[0])*0.45,c[1]+(best[1]-c[1])*0.45];});

function buildNorthSVG(){
  const li=lagnaIdx();const P=PAL();
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('xmlns',NS);svg.setAttribute('width',V);svg.setAttribute('height',V);
  svg.setAttribute('viewBox',`0 0 ${V} ${V}`);
  svg.appendChild(mk('rect',{width:V,height:V,fill:'#fff'}));
  const FR={stroke:P.line,'stroke-width':'5','stroke-linejoin':'round'};
  const IN={stroke:P.line,'stroke-width':'4','stroke-linejoin':'round'};
  svg.appendChild(mk('rect',{x:0,y:0,width:V,height:V,fill:'none',...FR}));
  svg.appendChild(mk('polygon',{points:`${V/2},0 ${V},${V/2} ${V/2},${V} 0,${V/2}`,fill:'none',...IN}));
  svg.appendChild(mk('line',{x1:0,y1:0,x2:V,y2:V,...IN}));
  svg.appendChild(mk('line',{x1:V,y1:0,x2:0,y2:V,...IN}));
  if(li!==-1){
    N_NUM.forEach((np,i)=>{
      const rashi=(li+i)%12+1;
      if(i===0){
        // H1 (Lagna): fold the Ascendant into the house-number label as
        // "-Asc-10" — this frees a line in the (often crowded) lagna kite,
        // since "As" no longer needs its own row in the planet stack.
        svg.appendChild(mk('text',{x:np[0]*V,y:np[1]*V,'text-anchor':'middle','dominant-baseline':'middle','font-family':F,'font-size':'32','font-weight':'800',fill:P.line},`-Asc-${rashi}`));
      }else{
        svg.appendChild(mk('text',{x:np[0]*V,y:np[1]*V,'text-anchor':'middle','dominant-baseline':'middle','font-family':F,'font-size':'28','font-weight':'700',fill:P.num},rashi));
      }
    });
  }
  N_CEN.forEach((c,i)=>{
    const signIdx=li!==-1?(li+i)%12:i;
    // In the North chart the Ascendant is folded into the "-Asc-N" house label,
    // so omit the lagna from the planet stack here (South chart keeps showing it).
    const planets=planetsInSign(signIdx).filter(p=>p.key!=='lagna');const cnt=planets.length;if(!cnt)return;
    const hcx=c[0]*V,hcy=c[1]*V;const isKite=[0,3,6,9].includes(i);
    const availW=(isKite?0.24:0.20)*V;const availH=(isKite?0.22:0.16)*V;

    for(;fs>=14;fs--){const stackH=cnt*fs*1.16;const maxChars=Math.max(...planets.map(p=>pLabel(p).length));const estW=maxChars*fs*0.58;if(stackH<=availH*1.7&&estW<=availW*1.6)break;}
    const lineH=fs*1.16,totalH=cnt*lineH,startY=hcy-totalH/2+lineH/2;
    planets.forEach((p,pi)=>{svg.appendChild(mk('text',{x:hcx,y:startY+pi*lineH,'text-anchor':'middle','dominant-baseline':'middle','font-family':F,'font-size':fs,'font-weight':'700',fill:P.text},pLabel(p)));});
  });

}

/* ── EXPORT summary — compact inline flowing text (book style) ──────────────
   Each entry: Name – KARAKA-FLAGS DD Sgn MM – Nak(pada)
   Flags in red. Plain normal-weight text, nakshatra NOT underlined.
   Uses <tspan> runs so the renderer positions them — zero overlap.
   Entries wrap across lines using a conservative char-width estimate only to
   decide line breaks (not glyph positions, so estimate error can't overlap).
──────────────────────────────────────────────────────────────────────────── */
function buildTableSVG(w){
  const P=PAL();
  const ordered=planetsFixedOrder();
  if(!ordered.length)return null;
  const ann=computeAnnotations();const kar=computeKarakas();
  const PAD=8, FS=50, LH=74;
  // Each entry: <b>Su</b> – KAR-FLAGS DD Sgn MM – Nak(pada)  (flowing inline)
  const entries=ordered.map(p=>{
    const d=state.data[p.key];const si=SIGNS.indexOf(d.sign);
    const dd=Math.floor(d.deg||0),mm=String(Math.floor(((d.deg||0)-dd)*60)).padStart(2,'0');
    const np=nakPada(si,d.deg||0);const tags=ann[p.key]?[...ann[p.key]]:[];const k=kar[p.key]||'';
    const runs=[{t:p.s,w:'700',c:P.text}];   // planet abbreviation
    if(k||tags.length){
      runs.push({t:' – ',w:'400',c:P.num});
      if(k)runs.push({t:k,w:'400',c:P.line});
      tags.forEach((tg,ti)=>{
        if(k||ti>0)runs.push({t:'-',w:'400',c:P.line});   // connector, not underlined
        runs.push({t:tg,w:'400',c:P.line,u:true});          // flag code, underlined
      });
    }
    runs.push({t:` ${dd}° ${mm}′ - ${SIGN_S[si]} – `,w:'400',c:P.text});
    runs.push({t:`${np.abbr}(${np.pada})`,w:'400',c:P.text,i:true});  // nakshatra italic
    return {runs,plain:runs.map(r=>r.t).join('')};
  });
  // Measure real text widths with a canvas — exact, so lines fill the full width.
  const _mc=document.createElement('canvas').getContext('2d');
  const measure=(s,bold)=>{_mc.font=`${bold?'700':'400'} ${FS}px ${F}`;return _mc.measureText(s).width;};
  const entW=e=>e.runs.reduce((s,r)=>s+measure(r.t,r.w==='700'),0);
  const SEP='    ';
  const sepW=measure(SEP,false);
  const maxW=w-PAD*2;
  const lines=[];let cur=[];let curW=0;
  entries.forEach(e=>{
    const ew=entW(e);
    const add=(curW>0?sepW:0)+ew;
    if(curW>0 && curW+add>maxW){lines.push(cur);cur=[];curW=0;cur.push(e);curW=ew;}
    else{cur.push(e);curW+=add;}
  });
  if(cur.length)lines.push(cur);
  const TH=PAD+lines.length*LH+PAD;
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('xmlns',NS);svg.setAttribute('width',w);svg.setAttribute('height',TH);
  svg.setAttribute('viewBox',`0 0 ${w} ${TH}`);
  svg.appendChild(mk('rect',{width:w,height:TH,fill:'#fff'}));
  lines.forEach((line,li)=>{
    const y=PAD+li*LH+LH/2;
    const textEl=mk('text',{x:PAD,y,'text-anchor':'start','dominant-baseline':'middle','font-family':F,'font-size':FS});
    line.forEach((e,ei)=>{
      if(ei>0)textEl.appendChild(mk('tspan',{'font-weight':'400',fill:P.text,'xml:space':'preserve'},SEP));
      e.runs.forEach(r=>{const a={'font-weight':r.w,fill:r.c};if(r.i)a['font-style']='italic';if(r.u)a['text-decoration']='underline';textEl.appendChild(mk('tspan',a,r.t));});
    });
    svg.appendChild(textEl);
  });
  return svg;
}

function injectFont(svgEl){

  defs.prepend(st);
}
function svgToStr(svg){const c=svg.cloneNode(true);injectFont(c);return(new XMLSerializer()).serializeToString(c);}
function dlBlob(blob,name){const a=document.createElement('a');a.download=name;a.href=URL.createObjectURL(blob);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);}
function svgToPNGBlob(svgStr,pw,ph){
  return new Promise((res,rej)=>{
    const img=new Image();const url=URL.createObjectURL(new Blob([svgStr],{type:'image/svg+xml'}));
    img.onload=()=>{const cv=document.createElement('canvas');cv.width=pw;cv.height=ph||pw;const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,pw,ph||pw);ctx.drawImage(img,0,0,pw,ph||pw);URL.revokeObjectURL(url);cv.toBlob(b=>b?res(b):rej(),'image/png');};
    img.onerror=()=>{URL.revokeObjectURL(url);rej();};img.src=url;
  });
}
async function exportPNG(which){
  showToast('Rendering…');

    // Single-chart export: chart stands alone in the LEFT column; the title,
    // birth details AND the degree table all live stacked in the RIGHT column.
    // This keeps the details from crowding the chart, and a clear gap separates
    // the birth line from the first degree row so both read cleanly.
    const CHART=1000;const PAD=44,GAP=44,FOOT_H=state.footer?40:0;
    const RIGHT=1000;                          // right column width
    const P=PAL();
    const name=v('m-name'),dv=v('m-div')||'D1',date=v('m-date'),time=v('m-time'),loc=v('m-loc');
    const title=name||'Chart';
    const sub=[date,fmt12h(time),loc].filter(Boolean).join('  ·  ');

    // Title block (two stacked lines) — name bold on top, birth details below.
    const TITLE_FS=56, SUB_FS=36, TITLE_Y=42, SUB_Y=TITLE_Y+58, HEAD_H=SUB_Y+28;
    const hsvg=document.createElementNS(NS,'svg');
    hsvg.setAttribute('xmlns',NS);hsvg.setAttribute('width',RIGHT);hsvg.setAttribute('height',HEAD_H);
    hsvg.setAttribute('viewBox',`0 0 ${RIGHT} ${HEAD_H}`);
    hsvg.appendChild(mk('rect',{width:RIGHT,height:HEAD_H,fill:'#fff'}));
    hsvg.appendChild(mk('text',{x:0,y:TITLE_Y,'text-anchor':'start','dominant-baseline':'middle','font-family':F,'font-size':TITLE_FS,'font-weight':'800',fill:P.text},title));
    if(sub)hsvg.appendChild(mk('text',{x:0,y:SUB_Y,'text-anchor':'start','dominant-baseline':'middle','font-family':F,'font-size':SUB_FS,'font-weight':'400',fill:P.text},sub));
    injectFont(hsvg);
    const headSvgStr=(new XMLSerializer()).serializeToString(hsvg);

    // Degree table within the right column width.
    const tableSvg=buildTableSVG(RIGHT);
    const tableH=tableSvg?parseInt(tableSvg.getAttribute('height')):0;
    const tableStr=tableSvg?(()=>{injectFont(tableSvg);return(new XMLSerializer()).serializeToString(tableSvg);})():null;

    const HEAD_GAP=44;                         // breathing room: details → degrees
    const rightH=HEAD_H+HEAD_GAP+tableH;
    const midH=Math.max(CHART,rightH);
    const W=PAD+CHART+GAP+RIGHT+PAD;
    const H=PAD+midH+FOOT_H+PAD;

    // Footer (only if enabled) — same as dual, spans full width.
    let footStr=null;
    if(state.footer){
      const fsvg=document.createElementNS(NS,'svg');
      fsvg.setAttribute('xmlns',NS);fsvg.setAttribute('width',W);fsvg.setAttribute('height',FOOT_H);
      fsvg.setAttribute('viewBox',`0 0 ${W} ${FOOT_H}`);
      fsvg.appendChild(mk('rect',{width:W,height:FOOT_H,fill:'#fff'}));
      fsvg.appendChild(mk('text',{x:W/2,y:FOOT_H/2,'text-anchor':'middle','dominant-baseline':'middle','font-family':F,'font-size':'18','font-weight':'600',fill:P.num},'astrogaami.com'));
      injectFont(fsvg);
      footStr=(new XMLSerializer()).serializeToString(fsvg);
    }

    const chartStr=svgToStr(which==='south'?buildSouthSVG():buildNorthSVG());
    const SC=2;
    const jobs=[svgToPNGBlob(chartStr,CHART*SC),svgToPNGBlob(headSvgStr,RIGHT*SC,HEAD_H*SC)];
    if(tableStr)jobs.push(svgToPNGBlob(tableStr,RIGHT*SC,tableH*SC));
    if(footStr)jobs.push(svgToPNGBlob(footStr,W*SC,FOOT_H*SC));
    const blobs=await Promise.all(jobs);
    const imgs=await Promise.all(blobs.map(b=>new Promise((r,rj)=>{const i=new Image();const u=URL.createObjectURL(b);i.onload=()=>{URL.revokeObjectURL(u);r(i);};i.onerror=()=>{URL.revokeObjectURL(u);rj();};i.src=u;})));
    const cv=document.createElement('canvas');cv.width=W*SC;cv.height=H*SC;
    const ctx=cv.getContext('2d');ctx.scale(SC,SC);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    const rightX=PAD+CHART+GAP;
    // Chart alone on the left, top-aligned with the title.
    ctx.drawImage(imgs[0],PAD,PAD,CHART,CHART);
    // Right column: title block, gap, then the degree table.
    ctx.drawImage(imgs[1],rightX,PAD,RIGHT,HEAD_H);
    let idx=2;
    if(tableStr){ctx.drawImage(imgs[idx],rightX,PAD+HEAD_H+HEAD_GAP,RIGHT,tableH);idx++;}
    if(footStr){ctx.drawImage(imgs[idx],0,H-FOOT_H-PAD/2,W,FOOT_H);}
    const lbl=(which==='south'?'South':'North')+'_'+(name||'Chart')+'_'+dv;
    cv.toBlob(b=>{if(!b){showToast('Export failed');return;}dlBlob(b,`${lbl}_${Date.now()}.png`);showToast('Single PNG exported ✓');},'image/png');
  }catch(e){console.error(e);showToast('Export failed');}
}
async function exportDualPNG(){
  showToast('Rendering…');
  try{
    const CHART=1000;const PAD=44,GAP=44,META_H=88,FOOT_H=state.footer?40:0;
    const P=PAL();
    const tableW=CHART*2+GAP;
    const tableSvg=buildTableSVG(tableW);
    const tableH=tableSvg?parseInt(tableSvg.getAttribute('height')):0;
    const tableStr=tableSvg?(()=>{injectFont(tableSvg);return(new XMLSerializer()).serializeToString(tableSvg);})():null;
    const W=tableW+PAD*2;
    const H=PAD+META_H+CHART+(tableH?tableH+14:0)+FOOT_H+PAD;
    const name=v('m-name'),dv=v('m-div')||'D1',date=v('m-date'),time=v('m-time'),loc=v('m-loc');

    // Single-line header (crisp SVG, left-indented): name + division bold,
    // then birth details inline in lighter tone — compact, one row.
    const hsvg=document.createElementNS(NS,'svg');
    hsvg.setAttribute('xmlns',NS);hsvg.setAttribute('width',W);hsvg.setAttribute('height',META_H);
    hsvg.setAttribute('viewBox',`0 0 ${W} ${META_H}`);
    hsvg.appendChild(mk('rect',{width:W,height:META_H,fill:'#fff'}));
    const hy=META_H/2-4;
    // Name (bold) + birth details (regular) as ONE text element with tspans,
    // so the renderer flows the details right after the name — no overlap.
    const title=name||'Chart';
    const sub=[date,fmt12h(time),loc].filter(Boolean).join('  ·  ');
    const hEl=mk('text',{x:PAD,y:hy,'text-anchor':'start','dominant-baseline':'middle','font-family':F,'font-size':'50'});
    hEl.appendChild(mk('tspan',{'font-weight':'800',fill:P.text},title));
    if(sub)hEl.appendChild(mk('tspan',{'font-weight':'400',fill:P.text,'xml:space':'preserve'},'    '+sub));
    hsvg.appendChild(hEl);
    injectFont(hsvg);
    const headSvgStr=(new XMLSerializer()).serializeToString(hsvg);

    // Footer SVG (only if enabled)
    let footStr=null;
    if(state.footer){
      const fsvg=document.createElementNS(NS,'svg');
      fsvg.setAttribute('xmlns',NS);fsvg.setAttribute('width',W);fsvg.setAttribute('height',FOOT_H);
      fsvg.setAttribute('viewBox',`0 0 ${W} ${FOOT_H}`);
      fsvg.appendChild(mk('rect',{width:W,height:FOOT_H,fill:'#fff'}));
      fsvg.appendChild(mk('text',{x:W/2,y:FOOT_H/2,'text-anchor':'middle','dominant-baseline':'middle','font-family':F,'font-size':'18','font-weight':'600',fill:P.num},'astrogaami.com'));
      injectFont(fsvg);
      footStr=(new XMLSerializer()).serializeToString(fsvg);
    }

    const sSvg=svgToStr(buildSouthSVG());const nSvg=svgToStr(buildNorthSVG());
    const SC=2;
    const jobs=[svgToPNGBlob(sSvg,CHART*SC),svgToPNGBlob(nSvg,CHART*SC),svgToPNGBlob(headSvgStr,W*SC,META_H*SC)];
    if(tableStr)jobs.push(svgToPNGBlob(tableStr,tableW*SC,tableH*SC));
    if(footStr)jobs.push(svgToPNGBlob(footStr,W*SC,FOOT_H*SC));
    const blobs=await Promise.all(jobs);
    const imgs=await Promise.all(blobs.map(b=>new Promise((r,rj)=>{const i=new Image();const u=URL.createObjectURL(b);i.onload=()=>{URL.revokeObjectURL(u);r(i);};i.onerror=()=>{URL.revokeObjectURL(u);rj();};i.src=u;})));
    const cv=document.createElement('canvas');cv.width=W*SC;cv.height=H*SC;
    const ctx=cv.getContext('2d');ctx.scale(SC,SC);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    // Header SVG
    ctx.drawImage(imgs[2],0,PAD,W,META_H);
    const chartY=PAD+META_H;
    // Place charts — respect swap toggle (South left by default)
    const leftImg =state.swap?imgs[1]:imgs[0];
    const rightImg=state.swap?imgs[0]:imgs[1];
    ctx.drawImage(leftImg,PAD,chartY,CHART,CHART);
    ctx.drawImage(rightImg,PAD+CHART+GAP,chartY,CHART,CHART);
    let idx=3;
    if(tableStr){ctx.drawImage(imgs[idx],PAD,chartY+CHART+14,tableW,tableH);idx++;}
    if(footStr){ctx.drawImage(imgs[idx],0,H-FOOT_H-PAD/2,W,FOOT_H);}
    cv.toBlob(b=>{if(!b){showToast('Export failed');return;}dlBlob(b,`${name||'Chart'}_${dv}_${Date.now()}.png`);showToast('Dual PNG exported ✓');},'image/png');
  }catch(e){console.error(e);showToast('Export failed');}
}

/* ══ EVENTS ════════════════════════════════════════════════════════════════ */
function showToast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
['m-name','m-div','m-date','m-time','m-loc'].forEach(id=>el(id).addEventListener('input',renderAll));
// Normalize the time field to explicit 12-hour AM/PM once the user finishes
// editing (on blur/change), so the form clearly shows morning vs evening.
el('m-time').addEventListener('change',()=>{const t=v('m-time');if(t){el('m-time').value=fmt12h(t);renderAll();}});
el('tog-deg').classList.toggle('on',state.degInChart);
el('tog-deg').addEventListener('click',()=>{state.degInChart=!state.degInChart;el('tog-deg').classList.toggle('on',state.degInChart);renderAll();});
el('tog-foot').addEventListener('click',()=>{state.footer=!state.footer;el('tog-foot').classList.toggle('on',state.footer);});
el('tog-swap').addEventListener('click',()=>{
  state.swap=!state.swap;el('tog-swap').classList.toggle('on',state.swap);
  el('panel-south').style.order=state.swap?'2':'1';
  el('panel-north').style.order=state.swap?'1':'2';
});
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(renderAll,80);});
const openM=()=>{el('modal').style.display='flex';el('jtin').value='';hideErr();};
const closeM=()=>{el('modal').style.display='none';};
const showErr=msg=>{el('jerr').textContent=msg;el('jerr').style.display='block';el('jtin').classList.add('err');};
const hideErr=()=>{el('jerr').style.display='none';el('jtin').classList.remove('err');};
el('btn-jhora').addEventListener('click',openM);
el('btn-clear').addEventListener('click',()=>{
  Object.keys(state.data).forEach(k=>state.data[k]=null);
  state.selectedPlanet=null;
  // Also wipe the native's meta details so a new chart starts clean.
  ['m-name','m-date','m-time','m-loc'].forEach(id=>el(id).value='');
  el('m-div').value='D1';
  buildSidebar();renderAll();
});
el('mcls').addEventListener('click',closeM);el('mcan').addEventListener('click',closeM);
el('bparse').addEventListener('click',()=>{
  const txt=el('jtin').value;
  const res=parseJhora(txt);
  if(!Object.keys(res).length){showErr('No planet data found. Paste JHora Basic Data section.');return;}
  Object.assign(state.data,res);
  // Auto-fill metabar from the JHora header block. A new paste means a new
  // chart, so parsed values overwrite the previous chart's details (any field
  // the header doesn't provide is left as-is, so manual edits there survive).
  const meta=parseJhoraMeta(txt);
  if(meta.name)el('m-name').value=meta.name;
  if(meta.date)el('m-date').value=meta.date;
  if(meta.time)el('m-time').value=fmt12h(meta.time);
  if(meta.place)el('m-loc').value=meta.place;
  // If planets loaded but the header block (Date/Time/Place) wasn't in the
  // paste, the metabar keeps its previous values — tell the user so it's
  // never mistaken for a bug. (Include the JHora header to auto-fill details.)
  if(!meta.date && !meta.time && !meta.place){
    showToast('Chart loaded — birth details not in paste (include the JHora header to auto-fill)');
  }
  state.selectedPlanet=null;closeM();buildSidebar();renderAll();
});
el('btn-es-png').addEventListener('click',()=>exportPNG('south'));
el('btn-en-png').addEventListener('click',()=>exportPNG('north'));
el('btn-dual-png').addEventListener('click',exportDualPNG);
el('modal').addEventListener('click',e=>{if(e.target===el('modal'))closeM();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
buildPalette();buildSidebar();renderAll();
</script>
